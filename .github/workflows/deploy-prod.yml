name: Deploy CloudMentor Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Lambda backend and update Amplify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Build and deploy backend with AWS SAM
        working-directory: backend
        run: |
          set -euo pipefail
          npm install
          sam build
          sam deploy \
            --stack-name "${{ secrets.SAM_STACK_NAME }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --s3-bucket "cloudmentor-sam-deploy-bucket-shehab" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides OpenAiApiKey="${{ secrets.OPENAI_API_KEY }}" OpenAiModel="${{ secrets.OPENAI_MODEL }}" AiMode="${{ secrets.AI_MODE }}" CorsOrigin="${{ secrets.CORS_ORIGIN }}"

      - name: Read backend outputs and Update Amplify
        run: |
          set -euo pipefail
          # API URL বের করা
          API_BASE_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ secrets.SAM_STACK_NAME }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiBaseUrl'].OutputValue" \
            --output text)

          echo "Updating Amplify with API URL: $API_BASE_URL"
          
          # অ্যামপ্লিফাইয়ের এনভায়রনমেন্ট ভেরিয়েবল আপডেট করা
          aws amplify update-app \
            --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
            --environment-variables VITE_API_BASE_URL="$API_BASE_URL"

          echo "Amplify environment updated successfully."